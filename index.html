<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="FitAI"/>
<meta name="theme-color" content="#080810"/>
<title>FitAI Coach</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700;800;900&family=Space+Mono:wght@400;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{background:#080810;font-family:'DM Sans',-apple-system,sans-serif;color:#F0F4FF;min-height:100vh;overscroll-behavior:none}
::-webkit-scrollbar{display:none}
input,button,textarea,select{font-family:'DM Sans',-apple-system,sans-serif;outline:none}
input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none}
input[type=range]{accent-color:#5EEAD4;width:100%}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes bounceIn{0%{transform:scale(0.7);opacity:0}60%{transform:scale(1.05)}100%{transform:scale(1);opacity:1}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes bobble{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
@keyframes glow{0%,100%{box-shadow:0 0 10px rgba(94,234,212,0.3)}50%{box-shadow:0 0 25px rgba(94,234,212,0.6)}}
@keyframes slideUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
@keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(-10px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}

.fade{animation:fadeUp 0.25s ease both}
.slide{animation:slideUp 0.3s ease both}
.pop{animation:bounceIn 0.3s ease both}

/* Layout */
.page{display:flex;flex-direction:column;gap:12px;padding:12px;padding-bottom:110px;max-width:480px;margin:0 auto}

/* Cards */
.card{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:20px;padding:16px}
.card-em{background:linear-gradient(135deg,rgba(94,234,212,0.07),rgba(96,165,250,0.07));border:1px solid rgba(94,234,212,0.2);border-radius:20px;padding:16px}
.card-warn{background:rgba(251,146,60,0.06);border:1px solid rgba(251,146,60,0.18);border-radius:20px;padding:16px}
.card-red{background:rgba(248,113,113,0.06);border:1px solid rgba(248,113,113,0.18);border-radius:20px;padding:16px}
.card-purple{background:rgba(167,139,250,0.06);border:1px solid rgba(167,139,250,0.18);border-radius:20px;padding:16px}
.card-blue{background:rgba(96,165,250,0.06);border:1px solid rgba(96,165,250,0.18);border-radius:20px;padding:16px}

/* Buttons */
.btn{width:100%;padding:14px;border-radius:14px;font-weight:800;font-size:15px;cursor:pointer;border:none;display:block;text-align:center;transition:all 0.15s;letter-spacing:0.2px}
.btn:active{opacity:0.8;transform:scale(0.97)}
.btn-primary{background:linear-gradient(135deg,#5EEAD4,#60A5FA);color:#080810}
.btn-secondary{background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);color:#94A3B8}
.btn-ghost{background:rgba(94,234,212,0.08);border:1px solid rgba(94,234,212,0.25);color:#5EEAD4;border-radius:12px;padding:11px;font-weight:700;font-size:13px;cursor:pointer;width:100%;text-align:center;transition:all 0.15s}
.btn-ghost:active{transform:scale(0.97)}
.btn-warn{background:rgba(251,146,60,0.12);border:1px solid rgba(251,146,60,0.3);color:#FB923C;border-radius:12px;padding:11px;font-weight:700;font-size:13px;cursor:pointer;width:100%}
.btn-danger{background:rgba(248,113,113,0.08);border:1px solid rgba(248,113,113,0.25);color:#F87171;border-radius:12px;padding:13px;font-weight:700;font-size:14px;cursor:pointer;width:100%}
.btn-sm{padding:7px 13px;border-radius:9px;font-weight:700;font-size:12px;cursor:pointer;border:none;transition:all 0.15s}
.btn-sm:active{transform:scale(0.93)}
.btn-purple{background:rgba(167,139,250,0.12);border:1px solid rgba(167,139,250,0.3);color:#A78BFA;border-radius:12px;padding:11px;font-weight:700;font-size:13px;cursor:pointer;width:100%}

/* Inputs */
.inp{width:100%;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.08);border-radius:12px;padding:12px 14px;color:#F0F4FF;font-size:15px;display:block;transition:border 0.2s}
.inp:focus{border-color:rgba(94,234,212,0.4);background:rgba(255,255,255,0.07)}
.inp::placeholder{color:#334155}
.sinp{background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.08);border-radius:8px;padding:8px;color:#F0F4FF;font-size:14px;text-align:center;width:100%;transition:border 0.2s}
.sinp:focus{border-color:rgba(94,234,212,0.4)}
.textarea{width:100%;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.08);border-radius:12px;padding:12px 14px;color:#F0F4FF;font-size:14px;resize:none;min-height:75px;line-height:1.5;transition:border 0.2s}
.textarea:focus{border-color:rgba(94,234,212,0.4)}

/* Chips */
.chip{padding:8px 13px;border-radius:10px;font-weight:600;cursor:pointer;font-size:13px;border:1px solid rgba(255,255,255,0.08);background:rgba(255,255,255,0.04);color:#64748B;transition:all 0.15s;display:inline-block}
.chip.on{background:rgba(94,234,212,0.1);border-color:rgba(94,234,212,0.35);color:#5EEAD4}
.chip:active{transform:scale(0.95)}

/* Labels */
.lbl{color:#64748B;font-size:10px;font-weight:700;margin-bottom:5px;display:block;letter-spacing:0.8px;text-transform:uppercase}
.sec{font-weight:800;margin-bottom:12px;font-size:15px}

/* Badges */
.badge{display:inline-block;border-radius:99px;padding:2px 9px;font-size:11px;font-weight:700}
.bg{background:rgba(94,234,212,0.12);color:#5EEAD4}
.br{background:rgba(248,113,113,0.12);color:#F87171}
.bo{background:rgba(251,146,60,0.12);color:#FB923C}
.bb{background:rgba(96,165,250,0.12);color:#60A5FA}
.bp{background:rgba(167,139,250,0.12);color:#A78BFA}

/* Progress */
.bt{height:5px;background:rgba(255,255,255,0.06);border-radius:99px;overflow:hidden;margin-top:4px}
.bf{height:100%;border-radius:99px;transition:width 0.5s ease}

/* Grid helpers */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.r2{display:flex;gap:8px}
.r2>*{flex:1}
.fb{display:flex;justify-content:space-between;align-items:center}
.fc{display:flex;align-items:center}
.gap6{gap:6px}
.gap8{gap:8px}
.gap10{gap:10px}
.mt6{margin-top:6px}
.mt10{margin-top:10px}
.mt12{margin-top:12px}
.mt16{margin-top:16px}
.mb6{margin-bottom:6px}
.mb10{margin-bottom:10px}
.mb12{margin-bottom:12px}

/* Mbox */
.mbox{text-align:center;background:rgba(255,255,255,0.04);border-radius:12px;padding:8px 4px}

/* Week grid */
.week7{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
.wbox{text-align:center;cursor:pointer}
.wday{height:44px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:800;margin-bottom:3px;border:1px solid rgba(255,255,255,0.06);background:rgba(255,255,255,0.03);color:#475569;transition:all 0.2s}
.wlbl{font-size:9px;color:#475569;font-weight:600}

/* Food rows */
.food-row{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid rgba(255,255,255,0.05)}
.food-row:last-child{border-bottom:none}

/* Set grid */
.sg{display:grid;grid-template-columns:22px 1fr 1fr 30px;gap:6px;align-items:center;margin-bottom:6px}

/* Chat */
.chat-box{display:flex;flex-direction:column;gap:10px;overflow-y:auto;flex:1;padding-bottom:8px}
.c-ai{align-self:flex-start;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.08);border-radius:18px 18px 18px 4px;padding:10px 14px;max-width:90%;font-size:14px;line-height:1.65}
.c-user{align-self:flex-end;background:rgba(94,234,212,0.1);border:1px solid rgba(94,234,212,0.2);border-radius:18px 18px 4px 18px;padding:10px 14px;max-width:90%;font-size:14px;line-height:1.65}

/* Nav */
.nav-bar{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:rgba(8,8,16,0.97);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border-top:1px solid rgba(255,255,255,0.07);display:flex;padding:6px 0 20px;z-index:100}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;background:none;border:none;cursor:pointer;padding:5px 2px;transition:transform 0.1s}
.nav-btn:active{transform:scale(0.82)}

/* Header */
.hdr{position:sticky;top:0;z-index:99;background:rgba(8,8,16,0.96);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border-bottom:1px solid rgba(255,255,255,0.06);padding:11px 16px 9px}

/* Onboarding */
.ob{min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:36px 18px 100px;max-width:480px;margin:0 auto}
.sdot{width:7px;height:7px;border-radius:99px;background:rgba(255,255,255,0.1);transition:all 0.3s}
.sdot.on{background:#5EEAD4;width:22px}

/* Key wrapper */
.kw{position:relative}
.kw .inp{padding-right:54px}
.ktog{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;color:#64748B;font-size:11px;cursor:pointer;padding:4px;font-weight:700}

/* Alerts */
.al{border-radius:12px;padding:10px 13px;font-size:13px;margin-top:8px;line-height:1.5}
.al-ok{background:rgba(94,234,212,0.08);border:1px solid rgba(94,234,212,0.25);color:#5EEAD4}
.al-fail{background:rgba(248,113,113,0.08);border:1px solid rgba(248,113,113,0.25);color:#F87171}
.al-info{background:rgba(251,146,60,0.08);border:1px solid rgba(251,146,60,0.25);color:#FB923C}
.al-blue{background:rgba(96,165,250,0.08);border:1px solid rgba(96,165,250,0.25);color:#60A5FA}

/* Water dots */
.wd{width:34px;height:34px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:15px;cursor:pointer;border:1.5px solid rgba(255,255,255,0.07);background:rgba(255,255,255,0.03);transition:all 0.15s}
.wd.on{background:rgba(96,165,250,0.15);border-color:#60A5FA}
.hi{width:55px;height:55px;border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:26px;margin:0 auto 5px;border:1.5px solid rgba(255,255,255,0.07);background:rgba(255,255,255,0.03);cursor:pointer;transition:all 0.2s}
.hi.on{background:rgba(94,234,212,0.1);border-color:#5EEAD4}

/* Photo */
.pz{border:2px dashed rgba(255,255,255,0.1);border-radius:16px;text-align:center;cursor:pointer;overflow:hidden;transition:border-color 0.2s}
.pz:hover{border-color:rgba(94,234,212,0.35)}
.pz img{width:100%;max-height:200px;object-fit:cover;display:block}
.pph{padding:28px 20px}

/* Score ring */
.sw{position:relative;flex-shrink:0}
.st{position:absolute;top:0;left:0;width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center}

/* Loader */
.ld{display:flex;gap:4px;align-items:center;justify-content:center}
.ld span{width:5px;height:5px;border-radius:99px;background:#5EEAD4;animation:pulse 0.9s infinite}
.ld span:nth-child(2){animation-delay:0.18s}
.ld span:nth-child(3){animation-delay:0.36s}

/* Modal */
.modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.85);z-index:200;display:flex;align-items:flex-end;justify-content:center}
.modal-sheet{background:#0E0E1A;border-radius:24px 24px 0 0;padding:22px 18px 40px;width:100%;max-width:480px;animation:slideUp 0.3s ease;max-height:85vh;overflow-y:auto}
.modal-handle{width:32px;height:3px;background:#334155;border-radius:99px;margin:0 auto 18px}

/* Provider cards */
.prov-card{background:rgba(255,255,255,0.04);border:2px solid rgba(255,255,255,0.07);border-radius:16px;padding:15px;margin-bottom:10px;cursor:pointer;transition:all 0.2s}
.prov-card.sel{border-color:#5EEAD4;background:rgba(94,234,212,0.05)}
.prov-card:active{transform:scale(0.97)}

/* Heatmap */
.heatmap{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;padding:8px 0}
.mcircle{width:42px;height:42px;border-radius:99px;display:flex;align-items:center;justify-content:center;font-size:17px;margin:0 auto 3px;border:2px solid;transition:all 0.3s}
.mname{font-size:9px;color:#64748B;font-weight:600;text-align:center}

/* Diet options */
.diet-opt{background:rgba(255,255,255,0.03);border:1.5px solid rgba(255,255,255,0.07);border-radius:14px;padding:13px;margin-bottom:9px;cursor:pointer;transition:all 0.2s}
.diet-opt.active{background:rgba(94,234,212,0.06);border-color:rgba(94,234,212,0.35)}
.diet-opt:active{transform:scale(0.98)}

/* Rest timer */
.rest-card{background:linear-gradient(135deg,rgba(167,139,250,0.08),rgba(96,165,250,0.08));border:1px solid rgba(167,139,250,0.25);border-radius:16px;padding:14px;text-align:center;margin:8px 0}

/* Quick workout */
.qw-btn{background:linear-gradient(135deg,#FB923C,#F87171);border:none;border-radius:16px;padding:14px;color:#fff;font-weight:800;font-size:14px;cursor:pointer;width:100%;transition:all 0.15s;letter-spacing:0.3px}
.qw-btn:active{transform:scale(0.95)}

.tc{flex:1;padding:11px 6px;border-radius:11px;font-weight:700;font-size:13px;cursor:pointer;border:1.5px solid rgba(255,255,255,0.07);background:rgba(255,255,255,0.04);color:#64748B;text-align:center;transition:all 0.15s}
.tc.on{background:rgba(251,146,60,0.1);border-color:rgba(251,146,60,0.4);color:#FB923C}

/* Unit toggle */
.utog{display:flex;background:rgba(255,255,255,0.04);border-radius:10px;padding:3px;gap:2px}
.ubtn{flex:1;padding:7px;border-radius:8px;border:none;background:none;color:#64748B;font-size:12px;font-weight:700;cursor:pointer;transition:all 0.2s}
.ubtn.on{background:rgba(255,255,255,0.1);color:#F0F4FF}

/* Checkin */
.co{flex:1;padding:9px 5px;border-radius:10px;border:1px solid rgba(255,255,255,0.07);background:rgba(255,255,255,0.03);color:#64748B;font-size:12px;font-weight:600;cursor:pointer;text-align:center;transition:all 0.15s}
.co.on{background:rgba(94,234,212,0.08);border-color:rgba(94,234,212,0.35);color:#5EEAD4}

/* Toast */
.toast{position:fixed;top:76px;left:50%;transform:translateX(-50%);background:#0E0E1A;border:1px solid rgba(94,234,212,0.35);border-radius:14px;padding:10px 18px;color:#5EEAD4;font-weight:700;font-size:13px;z-index:300;animation:toastIn 0.2s ease;max-width:310px;text-align:center;white-space:nowrap}

/* Divider */
.div{height:1px;background:rgba(255,255,255,0.06);margin:10px 0}

/* Tomorrow card */
.tom-card{background:linear-gradient(135deg,rgba(96,165,250,0.07),rgba(167,139,250,0.07));border:1px solid rgba(96,165,250,0.2);border-radius:18px;padding:15px}

/* Cardio types */
.ctype{flex:1;padding:10px 6px;border-radius:11px;font-weight:700;font-size:12px;cursor:pointer;border:1.5px solid rgba(255,255,255,0.07);background:rgba(255,255,255,0.03);color:#64748B;text-align:center;transition:all 0.15s}
.ctype.on{background:rgba(248,113,113,0.1);border-color:rgba(248,113,113,0.35);color:#F87171}

/* Workout style */
.ws-card{background:rgba(255,255,255,0.03);border:1.5px solid rgba(255,255,255,0.07);border-radius:14px;padding:13px;margin-bottom:9px;cursor:pointer;transition:all 0.2s}
.ws-card.active{background:rgba(94,234,212,0.06);border-color:rgba(94,234,212,0.35)}
.ws-card:active{transform:scale(0.98)}

/* Exercise library */
.ex-item{display:flex;align-items:center;justify-content:space-between;padding:9px 0;border-bottom:1px solid rgba(255,255,255,0.04)}
.ex-item:last-child{border-bottom:none}

/* Time display mono */
.mono{font-family:'Space Mono',monospace}

/* Intensity */
.int-btn{flex:1;padding:9px 4px;border-radius:10px;font-weight:700;font-size:11px;cursor:pointer;border:1.5px solid rgba(255,255,255,0.07);background:rgba(255,255,255,0.03);color:#64748B;text-align:center;transition:all 0.15s}
.int-btn.on{background:rgba(248,113,113,0.1);border-color:rgba(248,113,113,0.35);color:#F87171}
</style>
</head>
<body>
<div id="root"></div>
<script>
// ═══════════════════════════════════════════════════

async function callAI(sys,msg,imgB64,imgType){
  const prov=D.aiProvider,key=D.apiKeys[prov];
  if(!key)throw new Error("No API key for "+prov);
  if(prov==="gemini")return callGemini(key,sys,msg,imgB64,imgType);
  if(prov==="claude")return callClaude(key,sys,msg,imgB64,imgType);
  if(prov==="openai")return callOpenAI(key,sys,msg,imgB64,imgType);
}

async function callGemini(key,sys,msg,imgB64,imgType){
  const parts=[];
  if(imgB64)parts.push({inline_data:{mime_type:imgType,data:imgB64}});
  parts.push({text:(sys?sys+"\n\n":"")+msg});
  const r=await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${key}`,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({contents:[{parts}],generationConfig:{maxOutputTokens:1500}})});
  const d=await r.json();if(d.error)throw new Error(d.error.message);
  return d.candidates?.[0]?.content?.parts?.[0]?.text||"";
}

async function callClaude(key,sys,msg,imgB64,imgType){
  const content=[];
  if(imgB64)content.push({type:"image",source:{type:"base64",media_type:imgType,data:imgB64}});
  content.push({type:"text",text:msg});
  const body={model:"claude-sonnet-4-20250514",max_tokens:1500,messages:[{role:"user",content}]};
  if(sys)body.system=sys;
  const r=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json","x-api-key":key,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},body:JSON.stringify(body)});
  const d=await r.json();if(d.error)throw new Error(d.error.message);
  return d.content?.[0]?.text||"";
}

async function callOpenAI(key,sys,msg,imgB64,imgType){
  const messages=[];if(sys)messages.push({role:"system",content:sys});
  const content=[{type:"text",text:msg}];
  if(imgB64)content.unshift({type:"image_url",image_url:{url:`data:${imgType};base64,${imgB64}`}});
  messages.push({role:"user",content});
  const r=await fetch("https://api.openai.com/v1/chat/completions",{method:"POST",headers:{"Content-Type":"application/json","Authorization":"Bearer "+key},body:JSON.stringify({model:"gpt-4o",max_tokens:1500,messages})});
  const d=await r.json();if(d.error)throw new Error(d.error.message);
  return d.choices?.[0]?.message?.content||"";
}

async function testKeyFor(prov,key){
  const prev=D.aiProvider,prevK={...D.apiKeys};
  D.aiProvider=prov;D.apiKeys={...D.apiKeys,[prov]:key};
  try{await callAI(null,"Say OK");}
  finally{D.aiProvider=prev;D.apiKeys=prevK;}
}

function buildHeatmap(){
  const card=mk("div","card");card.innerHTML=`<div class="sec">💪 Muscle Heatmap</div>`;
  const last14=D.workoutLogs.filter(w=>new Date(w.date)>new Date(Date.now()-14*864e5));
  const trained={};
  last14.forEach(w=>{
    const en=w.exercises?.map(e=>e.name.toLowerCase())||[];
    if(w.type==="Push"||en.some(e=>e.includes("bench")||e.includes("press")&&!e.includes("leg")||e.includes("chest")||e.includes("push-up")))trained.Chest=(trained.Chest||0)+1;
    if(w.type==="Push"||en.some(e=>e.includes("shoulder")||e.includes("lateral")||e.includes("ohp")||e.includes("arnold")))trained.Shoulders=(trained.Shoulders||0)+1;
    if(w.type==="Push"||en.some(e=>e.includes("tricep")||e.includes("dip")||e.includes("extension")||e.includes("skull")))trained.Triceps=(trained.Triceps||0)+1;
    if(w.type==="Pull"||en.some(e=>e.includes("row")||e.includes("lat")||e.includes("back")||e.includes("pull-up")||e.includes("deadlift")))trained.Back=(trained.Back||0)+1;
    if(w.type==="Pull"||en.some(e=>e.includes("curl")||e.includes("bicep")))trained.Biceps=(trained.Biceps||0)+1;
    if(w.type==="Legs"||en.some(e=>e.includes("squat")||e.includes("leg")||e.includes("lunge")||e.includes("rdl")))trained.Legs=(trained.Legs||0)+1;
    if(en.some(e=>e.includes("glute")||e.includes("hip thrust")||e.includes("bridge")))trained.Glutes=(trained.Glutes||0)+1;
    if(en.some(e=>e.includes("core")||e.includes("abs")||e.includes("plank")||e.includes("crunch")))trained.Core=(trained.Core||0)+1;
  });
  const hm=mk("div","heatmap");
  MUSCLES.forEach(m=>{
    const n=trained[m]||0;
    const col=n>=3?"#5EEAD4":n>=2?"#60A5FA":n>=1?"#FB923C":"#F87171";
    const bg=n>=3?"rgba(94,234,212,0.12)":n>=2?"rgba(96,165,250,0.12)":n>=1?"rgba(251,146,60,0.12)":"rgba(248,113,113,0.08)";
    const mg=mk("div","","","text-align:center");
    mg.innerHTML=`<div class="mcircle" style="background:${bg};border-color:${col};color:${col}">${MI[m]}</div><div class="mname">${m}</div>`;
    hm.appendChild(mg);
  });
  card.appendChild(hm);
  const leg=mk("div","","","display:flex;gap:10px;justify-content:center;margin-top:7px");
  [["#5EEAD4","3+"],["#60A5FA","×2"],["#FB923C","×1"],["#F87171","Rest"]].forEach(([c,l])=>leg.appendChild(mk("div","",`<span style="color:${c};font-size:12px">●</span> <span style="color:#64748B;font-size:11px">${l}</span>`)));
  card.appendChild(leg);return card;
}

window.logTpl=i=>{const t=D.mealTemplates[i];D.foodLog.unshift({id:Date.now(),date:new Date().toISOString(),time:new Date().toTimeString().slice(0,5),...t});save();showToast("✓ "+t.name+" logged!");draw();};

  const s=WORKOUT_STYLES[D.workoutStyle];if(!s)return["Push","Pull","Legs"];

}

  const sw=mk("div","card");sw.innerHTML=`<div class="sec">🔄 Switch Diet</div><div style="color:#64748B;font-size:12px;margin-bottom:12px">Each switch starts a fresh 2-week adaptation.</div>`;
  Object.entries(DIETS).forEach(([id,d])=>{if(id===D.currentDiet)return;const btn=mk("button","diet-opt");btn.innerHTML=`<div class="fb"><div class="fc gap10"><span style="font-size:19px">${d.icon}</span><div><div style="font-weight:700">${d.name}</div><div style="color:#64748B;font-size:11px">${d.desc}</div></div></div><span style="color:#64748B;font-size:12px">Switch →</span></div>`;btn.onclick=()=>{if(confirm(`Switch to ${d.name}? Fresh 2-week adaptation begins.`)){upd({currentDiet:id,dietStartDate:new Date().toISOString(),lastDietCheckin:null});showToast("✓ Switched to "+d.name,2500);draw();}};sw.appendChild(btn);});pg.appendChild(sw);

  const ab=mk("button","btn-ghost","🤖 Personalised Diet Suggestion");ab.onclick=async()=>{if(!D.apiKeys[D.aiProvider]){showToast("Add API key in Profile");return;}ab.innerHTML=`<div class="ld"><span></span><span></span><span></span></div>`;ab.disabled=true;try{const t=await callAI(buildCtx(),"Based on this user's complete data, suggest the optimal diet. Consider food logs, workout performance, body metrics. Explain why in 3 specific sentences referencing their actual numbers.");const rd=mk("div","card-em","","margin-top:10px");rd.innerHTML=`<div style="color:#5EEAD4;font-size:10px;font-weight:700;margin-bottom:7px">🤖 RECOMMENDATION</div><div style="font-size:13px;line-height:1.65">${t}</div>`;ab.parentNode.insertBefore(rd,ab.nextSibling);}catch{ab.innerHTML="🤖 Personalised Diet Suggestion";ab.disabled=false;}};pg.appendChild(ab);
}

// ═══════════════════════════════════════════════════
// COACH
// ═══════════════════════════════════════════════════
function drawCoach(pg){
  pg.style.paddingBottom="130px";
  const wrap=mk("div","","","display:flex;flex-direction:column;height:calc(100vh - 145px)");
  if(!chatLog.length)chatLog=[{r:"ai",t:`Hi ${D.user.name}! I'm your AI Coach powered by ${PROVIDERS[D.aiProvider]?.name||"AI"} 🤖\n\nI have your complete data — workouts, nutrition, body metrics, diet history. Ask me anything.`}];
  const cb=mk("div","chat-box");
  chatLog.forEach(m=>{const d=mk("div",m.r==="ai"?"c-ai":"c-user");d.style.whiteSpace="pre-wrap";d.textContent=m.t;cb.appendChild(d);});
  if(chatBusy){const l=mk("div","c-ai");l.innerHTML=`<div class="ld"><span></span><span></span><span></span></div>`;cb.appendChild(l);}
  wrap.appendChild(cb);setTimeout(()=>{cb.scrollTop=cb.scrollHeight;},50);
  if(chatLog.length<=1){
    const qp=mk("div","","","display:flex;gap:5px;flex-wrap:wrap;padding-bottom:8px");
    ["What should I eat next?","Plan tomorrow's workout","How's my progress?","Break my plateau","Am I on track?"].forEach(q=>{const b=mk("button","chip",q,"font-size:12px;padding:7px 11px");b.onclick=()=>{chatInp=q;sendChat();};qp.appendChild(b);});wrap.appendChild(qp);
  }
  const ir=mk("div","fc gap8","","padding-top:8px");
  const ci=mk("input","inp");ci.placeholder="Ask anything...";ci.value=chatInp;ci.style.flex="1";ci.oninput=e=>chatInp=e.target.value;ci.onkeydown=e=>{if(e.key==="Enter")sendChat();};
  const sb=mk("button","","→","background:linear-gradient(135deg,#5EEAD4,#60A5FA);border:none;border-radius:12px;padding:0 16px;color:#080810;font-weight:900;font-size:17px;cursor:pointer;min-width:46px;height:46px");sb.onclick=sendChat;
  ir.appendChild(ci);ir.appendChild(sb);wrap.appendChild(ir);pg.appendChild(wrap);
}

async function sendChat(){
  if(!chatInp.trim()||chatBusy)return;
  if(!D.apiKeys[D.aiProvider]){chatLog.push({r:"user",t:chatInp},{r:"ai",t:`⚠️ No ${PROVIDERS[D.aiProvider]?.name} API key. Go to Profile → AI Settings to add one.`});chatInp="";draw();return;}
  const msg=chatInp.trim();chatInp="";chatBusy=true;chatLog.push({r:"user",t:msg});draw();
  try{const sys=`You are FitAI Coach. Complete user data:\n\n${buildCtx()}\n\nBe specific, reference their actual numbers. Be direct and motivating. Max 4-5 sentences unless they ask for a detailed plan.`;chatLog.push({r:"ai",t:await callAI(sys,msg)});}
  catch{chatLog.push({r:"ai",t:"Connection error. Check API key in Profile."});}
  chatBusy=false;draw();
}

// ═══════════════════════════════════════════════════
// PROFILE
// ═══════════════════════════════════════════════════
function drawProfile(pg){
  // AI provider
  const ac=mk("div","card");ac.innerHTML=`<div class="sec">🤖 AI Provider</div>`;
  const pr=mk("div","g3 mb12");
  Object.entries(PROVIDERS).forEach(([id,p])=>{const b=mk("button","chip"+(D.aiProvider===id?" on":""),"","text-align:center;padding:9px 4px");b.innerHTML=`<div style="font-size:14px">${p.icon}</div><div style="font-size:10px;font-weight:700;margin-top:1px">${p.name}</div><div style="font-size:9px;color:#64748B">${id==="gemini"?"Free":"Paid"}</div>`;b.onclick=()=>{D.aiProvider=id;save();draw();};pr.appendChild(b);});ac.appendChild(pr);
  Object.entries(PROVIDERS).forEach(([id,p])=>{
    const kd=mk("div","mb12");const hk=D.apiKeys[id];
    kd.innerHTML=`<label class="lbl">${p.name} Key ${hk?'<span style="color:#5EEAD4">✓</span>':'<span style="color:#475569">(not set)</span>'}</label>`;
    const kw=mk("div","kw");const ki=mk("input","inp");ki.type=profShow[id]?"text":"password";ki.placeholder=id==="gemini"?"AIza...":"sk-...";ki.value=D.apiKeys[id]||"";ki.style.paddingRight="54px";
    ki.oninput=e=>{D.apiKeys[id]=e.target.value;profStatus="";save();};
    const kt=mk("button","ktog",profShow[id]?"Hide":"Show");kt.onclick=()=>{profShow[id]=!profShow[id];draw();};kw.appendChild(ki);kw.appendChild(kt);kd.appendChild(kw);
    if(D.apiKeys[id]?.trim()){const tb=mk("button","btn-ghost","","margin-top:7px");tb.innerHTML=profTesting===id?`<div class="ld"><span></span><span></span><span></span></div>`:`Test ${p.name}`;tb.disabled=profTesting===id;tb.onclick=async()=>{profTesting=id;profStatus="";draw();try{await testKeyFor(id,D.apiKeys[id].trim());profStatus="ok_"+id;save();}catch{profStatus="fail_"+id;}profTesting=false;draw();};kd.appendChild(tb);}
    if(profStatus==="ok_"+id)kd.appendChild(mk("div","al al-ok","✓ "+p.name+" works!","margin-top:6px"));
    if(profStatus==="fail_"+id)kd.appendChild(mk("div","al al-fail","✗ Invalid key.","margin-top:6px"));
    ac.appendChild(kd);
  });
  ac.appendChild(mk("div","al al-blue","💡 Switching providers: all your history transfers automatically. New AI reads your complete data and continues seamlessly."));
  pg.appendChild(ac);

  // Workout style
  const wsc=mk("div","card");wsc.innerHTML=`<div class="sec">🏋️ Workout Style</div>`;
  Object.entries(WORKOUT_STYLES).forEach(([id,s])=>{const b=mk("button","chip"+(D.workoutStyle===id?" on":""),"","display:block;width:100%;text-align:left;padding:11px 13px;margin-bottom:6px");b.innerHTML=`${s.icon} <b>${s.name}</b> <span style="color:#64748B;font-size:12px">— ${s.desc}</span>`;b.onclick=()=>{D.workoutStyle=id;save();draw();};wsc.appendChild(b);});pg.appendChild(wsc);

  // Units
  const uc=mk("div","card");uc.innerHTML=`<div class="sec">🌍 Units</div>`;
  const ug=mk("div","g2");
  [{k:"weight",opts:["kg","lbs"]},{k:"height",opts:["cm","ft"]}].forEach(({k,opts})=>{const ud=mk("div");ud.appendChild(mk("label","lbl",k));const ut=mk("div","utog");opts.forEach(o=>{const b=mk("button","ubtn"+(D.units[k]===o?" on":""),o);b.onclick=()=>{D.units[k]=o;save();draw();};ut.appendChild(b);});ud.appendChild(ut);ug.appendChild(ud);});
  uc.appendChild(ug);pg.appendChild(uc);

  // Profile
  const pc=mk("div","card");pc.innerHTML=`<div class="sec">👤 Profile</div>`;
  const pf2={name:D.user.name,age:D.user.age,height:D.user.height,weight:D.user.weight,targetWeight:D.user.targetWeight};
  const pg2=mk("div","g2 mb10");
  [["name","Name","text","Akhil"],["age","Age","number","25"],["height",`Height (${hu()})`,`number`,"178"],["weight",`Weight (${wu()})`,`number`,"80"],["targetWeight",`Target (${wu()})`,`number`,"75"]].forEach(([k,l,t,ph])=>{const d=mk("div");d.appendChild(mk("label","lbl",l));const i=mk("input","inp");i.type=t;i.placeholder=ph;i.value=pf2[k]||"";i.oninput=e=>pf2[k]=e.target.value;d.appendChild(i);pg2.appendChild(d);});pc.appendChild(pg2);
  const gd=mk("div","mb10");gd.appendChild(mk("label","lbl","Goal"));const gr=mk("div","fc gap6 gap-wrap","","flex-wrap:wrap");[["muscle_gain","💪 Muscle Gain"],["fat_loss","🔥 Fat Loss"],["maintenance","⚖️ Maintenance"]].forEach(([v,l])=>{const b=mk("button","chip"+(D.user.goal===v?" on":""),l);b.onclick=()=>{D.user.goal=v;save();draw();};gr.appendChild(b);});gd.appendChild(gr);pc.appendChild(gd);
  const sv=mk("button","btn btn-primary",profSaved?"✓ Saved!":"Save Profile");if(profSaved){sv.style.background="rgba(94,234,212,0.1)";sv.style.color="#5EEAD4";}
  sv.onclick=()=>{Object.assign(D.user,pf2,{age:+pf2.age||D.user.age,height:+pf2.height||D.user.height,weight:+pf2.weight||D.user.weight,targetWeight:+pf2.targetWeight||D.user.targetWeight});save();profSaved=true;draw();showToast("✓ Profile saved!");setTimeout(()=>{profSaved=false;},2000);};pc.appendChild(sv);pg.appendChild(pc);

  // Targets
  const tc=mk("div","card");tc.innerHTML=`<div class="sec">🎯 Daily Targets</div>`;
  const tg=mk("div","g2");[["calories","Calories (kcal)"],["protein","Protein (g)"],["carbs","Carbs (g)"],["fats","Fats (g)"]].forEach(([k,l])=>{const d=mk("div");d.appendChild(mk("label","lbl",l));const i=mk("input","inp");i.type="number";i.value=D.targets[k]||"";i.oninput=e=>D.targets[k]=+e.target.value;d.appendChild(i);tg.appendChild(d);});tc.appendChild(tg);
  const ts=mk("button","btn-ghost","Save Targets","margin-top:9px");ts.onclick=()=>{save();showToast("✓ Targets saved!");};tc.appendChild(ts);pg.appendChild(tc);

  // Backup & restore
  const br=mk("div","card");br.innerHTML=`<div class="sec">🔄 Backup & Restore</div><div style="color:#64748B;font-size:13px;margin-bottom:12px">Export all data as JSON. Restore on any device anytime.</div>`;
  const eb=mk("button","btn-ghost","📤 Export Data","margin-bottom:8px");eb.onclick=()=>{const blob=new Blob([JSON.stringify(D,null,2)],{type:"application/json"});const url=URL.createObjectURL(blob);const a=document.createElement("a");a.href=url;a.download=`fitai_backup_${new Date().toISOString().split("T")[0]}.json`;a.click();URL.revokeObjectURL(url);showToast("✓ Data exported!");};br.appendChild(eb);
  const il=mk("label","btn-ghost","📥 Import Backup","display:block;text-align:center;cursor:pointer");const ii=mk("input");ii.type="file";ii.accept=".json";ii.style.display="none";ii.onchange=e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>{try{Object.assign(D,JSON.parse(ev.target.result));save();showToast("✓ Data restored!",3000);draw();}catch{showToast("Invalid file");}};r.readAsText(f);};il.appendChild(ii);br.appendChild(il);pg.appendChild(br);

  const rs=mk("button","btn-danger","⚠️ Reset All Data","margin-top:4px");rs.onclick=()=>{if(confirm("Reset ALL data? Cannot be undone.")){localStorage.removeItem(SK);location.reload();}};pg.appendChild(rs);
}

function startAIRotation(){clearInterval(aiTmr);aiTmr=setInterval(()=>{aiIdx++;if(tab==="home")draw();},7000);}
startAIRotation();
draw();
</script>
